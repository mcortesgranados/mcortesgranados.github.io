<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>CV MCG 2026 | Presentacion</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Unbounded:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg-1: #0b0f1c;
      --bg-2: #0f1f2b;
      --bg-3: #1e2a3f;
      --accent: #ffb347;
      --accent-2: #4de1ff;
      --text: #f2f5f8;
      --muted: rgba(242, 245, 248, 0.7);
      --panel: rgba(12, 18, 32, 0.65);
      --shadow: 0 25px 60px rgba(0, 0, 0, 0.45);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Space Grotesk", system-ui, sans-serif;
      color: var(--text);
      background: radial-gradient(circle at 10% 10%, rgba(77, 225, 255, 0.25), transparent 45%),
        radial-gradient(circle at 90% 20%, rgba(255, 179, 71, 0.25), transparent 50%),
        radial-gradient(circle at 30% 90%, rgba(145, 120, 255, 0.18), transparent 55%),
        linear-gradient(135deg, var(--bg-1), var(--bg-2) 40%, var(--bg-3));
      background-size: 140% 140%;
      animation: driftBg 18s ease-in-out infinite;
      overflow: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background-image: radial-gradient(rgba(255, 255, 255, 0.04) 1px, transparent 1px);
      background-size: 28px 28px;
      opacity: 0.6;
      pointer-events: none;
    }

    .orb {
      position: absolute;
      width: 320px;
      height: 320px;
      border-radius: 50%;
      filter: blur(0px);
      opacity: 0.45;
      mix-blend-mode: screen;
      animation: floatOrb 16s ease-in-out infinite;
      pointer-events: none;
    }

    .orb.one {
      background: radial-gradient(circle, rgba(77, 225, 255, 0.6), transparent 65%);
      top: 6%;
      left: 10%;
    }

    .orb.two {
      background: radial-gradient(circle, rgba(255, 179, 71, 0.6), transparent 65%);
      bottom: 8%;
      right: 12%;
      animation-delay: -4s;
    }

    .orb.three {
      background: radial-gradient(circle, rgba(160, 120, 255, 0.5), transparent 65%);
      top: 40%;
      right: 28%;
      animation-delay: -8s;
    }

    .stage {
      position: relative;
      height: 100vh;
      width: 100vw;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 80px 5vw 110px;
      perspective: 1600px;
    }

    .deck {
      position: relative;
      width: min(86vw, 1200px);
      height: min(72vh, 720px);
      display: block;
      transform-style: preserve-3d;
      transform: rotateX(var(--tilt-x, 0deg)) rotateY(var(--tilt-y, 0deg));
      transition: transform 800ms cubic-bezier(0.2, 0.8, 0.2, 1);
    }

    .slide {
      position: absolute;
      inset: 0;
      transform-style: preserve-3d;
      transition: transform 1200ms cubic-bezier(0.16, 0.88, 0.25, 1), opacity 900ms ease, filter 800ms ease;
      opacity: 0;
      pointer-events: none;
    }

    .slide.is-active {
      pointer-events: auto;
    }

    .frame {
      width: 100%;
      height: 100%;
      border-radius: 22px;
      overflow: hidden;
      box-shadow: var(--shadow);
      background: #0d1117;
      position: relative;
      border: 1px solid rgba(255, 255, 255, 0.08);
    }

    .frame::before {
      content: "";
      position: absolute;
      inset: -1px;
      background: linear-gradient(145deg, rgba(255, 255, 255, 0.18), transparent 45%, rgba(77, 225, 255, 0.2));
      opacity: 0.4;
      pointer-events: none;
      mix-blend-mode: screen;
    }

    .frame::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255, 255, 255, 0.08), transparent 55%);
      opacity: 0.45;
      pointer-events: none;
    }

    iframe {
      width: 1280px;
      height: 720px;
      border: none;
      position: absolute;
      top: 0;
      left: 0;
      transform-origin: top left;
      background: #0d1117;
    }

    .hud {
      position: absolute;
      top: 26px;
      left: 5vw;
      right: 5vw;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
      z-index: 20;
      font-family: "Unbounded", "Space Grotesk", sans-serif;
    }

    .hud .title {
      font-size: clamp(18px, 2.6vw, 28px);
      font-weight: 700;
      letter-spacing: 0.02em;
      text-transform: uppercase;
    }

    .hud .meta {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 6px;
      font-size: 12px;
      color: var(--muted);
    }

    .progress {
      width: 180px;
      height: 6px;
      background: rgba(255, 255, 255, 0.12);
      border-radius: 999px;
      overflow: hidden;
    }

    .progress .bar {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, var(--accent), var(--accent-2));
      transition: width 400ms ease;
    }

    .controls {
      position: absolute;
      bottom: 28px;
      left: 5vw;
      right: 5vw;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      z-index: 20;
    }

    .controls .cluster {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    button {
      appearance: none;
      border: none;
      padding: 12px 18px;
      border-radius: 999px;
      background: var(--panel);
      color: var(--text);
      font-family: "Space Grotesk", sans-serif;
      font-size: 14px;
      letter-spacing: 0.02em;
      cursor: pointer;
      transition: transform 250ms ease, background 250ms ease, box-shadow 250ms ease;
      box-shadow: 0 12px 25px rgba(0, 0, 0, 0.35);
    }

    button:hover {
      transform: translateY(-2px);
      background: rgba(12, 18, 32, 0.8);
    }

    .hint {
      font-size: 12px;
      color: var(--muted);
    }

    .counter {
      font-size: 14px;
      color: var(--muted);
    }

    .glow {
      position: absolute;
      inset: 0;
      pointer-events: none;
      background: radial-gradient(circle at 50% 55%, rgba(77, 225, 255, 0.15), transparent 60%);
      opacity: 0.6;
      animation: pulseGlow 6s ease-in-out infinite;
    }

    .fade-in {
      animation: floatIn 900ms ease forwards;
    }

    @keyframes floatIn {
      from {
        opacity: 0;
        transform: translateY(18px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes driftBg {
      0% {
        background-position: 0% 0%;
      }
      50% {
        background-position: 80% 60%;
      }
      100% {
        background-position: 0% 0%;
      }
    }

    @keyframes floatOrb {
      0% {
        transform: translate3d(0, 0, 0) scale(1);
      }
      50% {
        transform: translate3d(20px, -30px, 0) scale(1.08);
      }
      100% {
        transform: translate3d(0, 0, 0) scale(1);
      }
    }

    @keyframes pulseGlow {
      0% {
        opacity: 0.45;
      }
      50% {
        opacity: 0.75;
      }
      100% {
        opacity: 0.45;
      }
    }

    @media (max-width: 900px) {
      .hud {
        flex-direction: column;
        align-items: flex-start;
      }

      .controls {
        flex-direction: column;
        align-items: flex-start;
      }

      .controls .cluster {
        flex-wrap: wrap;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .slide {
        transition: none;
      }

      .deck,
      .glow,
      body {
        animation: none;
      }

      .fade-in {
        animation: none;
      }
    }
  </style>
</head>
<body>
  <div class="stage">
    <div class="orb one"></div>
    <div class="orb two"></div>
    <div class="orb three"></div>
    <div class="hud fade-in">
      <div class="title">CV MCG 2026 Deck</div>
      <div class="meta">
        <span class="counter" id="counter">01 / 17</span>
        <div class="progress" aria-hidden="true">
          <div class="bar" id="progress"></div>
        </div>
      </div>
    </div>

    <div class="deck" id="deck" aria-live="polite"></div>
    <div class="glow"></div>

    <div class="controls fade-in">
      <div class="cluster">
        <button type="button" id="prev">Anterior</button>
        <button type="button" id="next">Siguiente</button>
        <button type="button" id="toggle">Auto: ON</button>
      </div>
      <div class="cluster">
        <span class="hint">Usa flechas, rueda o espacio para pausar.</span>
      </div>
    </div>
  </div>

  <script>
    const totalSlides = 17;
    const slideFiles = Array.from({ length: totalSlides }, (_, i) => `page_${i + 1}.html`);
    const deck = document.getElementById("deck");
    const stage = document.querySelector(".stage");
    const counter = document.getElementById("counter");
    const progress = document.getElementById("progress");
    const prevBtn = document.getElementById("prev");
    const nextBtn = document.getElementById("next");
    const toggleBtn = document.getElementById("toggle");

    let current = 0;
    let autoplay = true;
    let timer = null;

    const slides = slideFiles.map((src, index) => {
      const slide = document.createElement("div");
      slide.className = "slide";
      slide.dataset.index = index;

      const frame = document.createElement("div");
      frame.className = "frame";

      const iframe = document.createElement("iframe");
      iframe.src = src;
      iframe.loading = index < 2 ? "eager" : "lazy";
      iframe.setAttribute("title", `Slide ${index + 1}`);

      frame.appendChild(iframe);
      slide.appendChild(frame);
      deck.appendChild(slide);

      return slide;
    });

    function scaleFrames() {
      slides.forEach((slide) => {
        const frame = slide.querySelector(".frame");
        const iframe = slide.querySelector("iframe");
        const scale = Math.min(frame.clientWidth / 1280, frame.clientHeight / 720);
        iframe.style.transform = `scale(${scale})`;
      });
    }

    function updateSlides() {
      const total = slides.length;
      const displayIndex = ((current % total) + total) % total;
      counter.textContent = `${String(displayIndex + 1).padStart(2, "0")} / ${total}`;
      progress.style.width = `${((displayIndex + 1) / total) * 100}%`;

      slides.forEach((slide, index) => {
        let offset = index - displayIndex;
        if (offset > total / 2) offset -= total;
        if (offset < -total / 2) offset += total;

        const abs = Math.abs(offset);
        const baseX = 36;
        const x = offset * baseX;
        const y = abs * 2.5;
        const rotate = offset * -14;
        const scale = abs === 0 ? 1 : abs === 1 ? 0.84 : abs === 2 ? 0.68 : 0.52;
        const opacity = abs > 2 ? 0 : 1 - abs * 0.2;
        const blur = abs === 0 ? 0 : abs === 1 ? 2 : abs === 2 ? 6 : 10;

        slide.style.transform = `translate3d(${x}vw, ${y}vh, 0) rotateY(${rotate}deg) scale(${scale})`;
        slide.style.opacity = opacity;
        if (abs === 0) {
          slide.style.filter = "none";
        } else {
          slide.style.filter = `blur(${blur}px) saturate(0.85)`;
        }
        slide.style.zIndex = String(10 - abs);
        slide.classList.toggle("is-active", abs === 0);
        slide.setAttribute("aria-hidden", abs !== 0);
      });
    }

    function goNext() {
      current = (current + 1) % slides.length;
      updateSlides();
    }

    function goPrev() {
      current = (current - 1 + slides.length) % slides.length;
      updateSlides();
    }

    function startAutoplay() {
      if (timer) return;
      timer = setInterval(goNext, 9000);
      toggleBtn.textContent = "Auto: ON";
    }

    function stopAutoplay() {
      clearInterval(timer);
      timer = null;
      toggleBtn.textContent = "Auto: OFF";
    }

    function toggleAutoplay() {
      autoplay = !autoplay;
      if (autoplay) {
        startAutoplay();
      } else {
        stopAutoplay();
      }
    }

    prevBtn.addEventListener("click", () => {
      stopAutoplay();
      autoplay = false;
      goPrev();
    });

    nextBtn.addEventListener("click", () => {
      stopAutoplay();
      autoplay = false;
      goNext();
    });

    toggleBtn.addEventListener("click", toggleAutoplay);

    window.addEventListener("keydown", (event) => {
      if (event.key === "ArrowRight") {
        stopAutoplay();
        autoplay = false;
        goNext();
      }
      if (event.key === "ArrowLeft") {
        stopAutoplay();
        autoplay = false;
        goPrev();
      }
      if (event.key === " ") {
        event.preventDefault();
        toggleAutoplay();
      }
    });

    window.addEventListener("wheel", (event) => {
      if (Math.abs(event.deltaY) < 20) return;
      stopAutoplay();
      autoplay = false;
      if (event.deltaY > 0) {
        goNext();
      } else {
        goPrev();
      }
    }, { passive: true });

    window.addEventListener("resize", scaleFrames);

    let tiltTimeout = null;
    function handleTilt(event) {
      const rect = stage.getBoundingClientRect();
      const x = (event.clientX - rect.left) / rect.width - 0.5;
      const y = (event.clientY - rect.top) / rect.height - 0.5;
      const tiltX = (y * -6).toFixed(2);
      const tiltY = (x * 8).toFixed(2);
      deck.style.setProperty("--tilt-x", `${tiltX}deg`);
      deck.style.setProperty("--tilt-y", `${tiltY}deg`);
      if (tiltTimeout) clearTimeout(tiltTimeout);
      tiltTimeout = setTimeout(() => {
        deck.style.setProperty("--tilt-x", "0deg");
        deck.style.setProperty("--tilt-y", "0deg");
      }, 2200);
    }

    stage.addEventListener("mousemove", handleTilt);

    updateSlides();
    scaleFrames();
    startAutoplay();
  </script>
</body>
</html>
